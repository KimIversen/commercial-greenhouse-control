services:
  # MariaDB - Sensor data storage (for HA + future AI analysis)
  mariadb:
    image: mariadb:10.11
    container_name: greenhouse_mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: homeassistant
      MARIADB_USER: homeassistant
      MARIADB_PASSWORD: ${MYSQL_HA_PASSWORD}
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./config/mariadb/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./backups:/backups
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - greenhouse_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Home Assistant - Central control system
  homeassistant:
    image: homeassistant/home-assistant:stable
    container_name: greenhouse_homeassistant
    restart: always
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      TZ: ${TZ}
    volumes:
      - ./config/homeassistant:/config
      - ./logs:/config/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8123:8123"
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/manifest.json"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - greenhouse_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ESPHome - ESP32 device management
  esphome:
    image: esphome/esphome:latest
    container_name: greenhouse_esphome
    restart: always
    environment:
      TZ: ${TZ}
    volumes:
      - ./config/esphome:/config
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "6052:6052"
    privileged: true
    networks:
      - greenhouse_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Mosquitto - MQTT broker for sensor communication
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: greenhouse_mosquitto
    restart: always
    volumes:
      - ./config/mosquitto:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "test", "-m", "test"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - greenhouse_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Watchtower - Keeps containers updated
  watchtower:
    image: containrrr/watchtower
    container_name: greenhouse_watchtower
    restart: always
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCHEDULE: "0 0 4 * * *"
      WATCHTOWER_INCLUDE_STOPPED: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - greenhouse_net

volumes:
  mariadb_data:
  mosquitto_data:
  mosquitto_logs:

networks:
  greenhouse_net:
    driver: bridge
